# Declare your Buildkite pipelines below
---
# yaml-language-server: $schema=https://gist.githubusercontent.com/elasticmachine/988b80dae436cafea07d9a4a460a011d/raw/rre.schema.json
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: buildkite-pipeline-integration-skills
  description: Buildkite Pipeline for integration-skills
  links:
    - title: Pipeline
      url: https://buildkite.com/elastic/integration-skills

spec:
  type: buildkite-pipeline
  owner: group:integration-experience
  system: buildkite
  implementation:
    apiVersion: buildkite.elastic.dev/v1
    kind: Pipeline
    metadata:
      name: integration-skills
      description: 
    spec:
      repository: elastic/integration-skills
      pipeline_file: ".buildkite/pipeline.yml"
      provider_settings:
        build_pull_request_forks: true
      teams:
        integration-experience:
          access_level: MANAGE_BUILD_AND_READ
        everyone:
          access_level: READ_ONLY
